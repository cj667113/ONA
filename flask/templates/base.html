<!doctype html>
<html id="response">

<head>
  <title>{{ title }}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
  <style>
    #backup-panel .form-label,
    #vnic-panel .form-label,
    #stats-panel .form-label {
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
      color: #495057;
    }

    #backup-list td:first-child,
    #vnic-list td:nth-child(3) {
      max-width: 520px;
      overflow-wrap: anywhere;
    }

    .metric-tile {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      min-height: 112px;
    }

    .metric-label {
      color: #6c757d;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric-value {
      font-size: 1.4rem;
      line-height: 1.2;
      font-weight: 600;
    }

    .metric-subtext {
      color: #6c757d;
      font-size: 0.82rem;
      min-height: 1.2rem;
    }

    .metric-progress {
      height: 0.35rem;
    }
  </style>
</head>

<body>
  <script type="text/javascript" src="{{url_for('static', filename='app.js')}}" defer></script>
  <div class="d-none">
    <div id="temp-delete-btn"><button onclick="deleteRule(this)" class="btn btn-outline-danger btn-sm">X</button></div>
    <select id="temp-dropdown" name="dropdown" value="tcp" class="select">
      <option value="tcp">TCP</option>
      <option value="udp">UDP</option>
    </select>
    <select id="temp-dropdown-snat-protocol" name="dropdown" value="all" class="select">
      <option value="all">ALL</option>
      <option value="tcp">TCP</option>
      <option value="udp">UDP</option>
    </select>
    <select id="temp-dropdown-2" name="dropdown" value="MASQUERADE" class="select">
      <option value="MASQUERADE">MASQUERADE</option>
      <option value="SNAT">SNAT</option>
    </select>
  </div>

  <div class="container">
    <h1 class="m-5">{{ title }}</h1>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-4 text-center">
          <button onclick="changeMenu('dnat')" type="button" id="dnat-btn" class="btn btn-primary btn-lg">Destination
            NAT</button>
        </div>
        <div class="col-4 text-center">
          <button onclick="changeMenu('snat')" type="button" id="snat-btn" class="btn btn-outline-primary btn-lg">Source
            NAT</button>
        </div>
      </div>
    </div>

    <hr>
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>

</html>
