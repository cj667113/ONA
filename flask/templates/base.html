<!doctype html>
<html id="response">

<head>
  <title>{{ title }}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <style>
    :root {
      --ona-bg: #f5f7fa;
      --ona-surface: #ffffff;
      --ona-surface-muted: #f8fafc;
      --ona-border: #d9e1ea;
      --ona-border-soft: #e8edf3;
      --ona-text: #111827;
      --ona-muted: #64748b;
      --ona-primary: #2563eb;
      --ona-primary-dark: #1d4ed8;
      --ona-accent: #0f766e;
      --ona-danger: #dc2626;
    }

    body {
      margin: 0;
      background: var(--ona-bg);
      color: var(--ona-text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app-shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 14px;
    }

    .app-brand {
      min-width: 0;
    }

    .app-title {
      margin: 0;
      font-size: clamp(1.85rem, 2vw, 2.15rem);
      line-height: 1.15;
      font-weight: 700;
      white-space: nowrap;
    }

    .app-kicker {
      margin: 0 0 4px;
      color: var(--ona-accent);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .app-meta {
      padding: 7px 11px;
      border: 1px solid var(--ona-border-soft);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      color: var(--ona-muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .app-nav {
      display: flex;
      justify-content: flex-start;
      min-width: 0;
      margin: 0 0 22px;
    }

    .nat-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, max-content));
      gap: 4px;
      width: fit-content;
      max-width: 100%;
      padding: 5px;
      background: #e9eef5;
      border: 1px solid var(--ona-border-soft);
      border-radius: 10px;
    }

    .nat-tab {
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: #475569;
      font-weight: 650;
      min-width: 0;
      padding: 11px 14px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .nat-tab.is-active {
      background: var(--ona-surface);
      color: var(--ona-text);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.1);
    }

    .app-panel {
      background: var(--ona-surface);
      border: 1px solid var(--ona-border);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.3;
      font-weight: 700;
    }

    .panel-status {
      color: var(--ona-muted);
      font-size: 0.86rem;
    }

    .panel-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .submit-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 1080;
      min-width: min(460px, calc(100vw - 32px));
      padding: 14px 22px;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      background: #ecfdf5;
      color: #047857;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
      font-weight: 700;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -18px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .submit-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    #backup-panel .form-label,
    #vnic-panel .form-label,
    #stats-panel .form-label {
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
      color: #495057;
    }

    #backup-list td:first-child,
    #vnic-list td:nth-child(3) {
      max-width: 280px;
    }

    .backup-actions {
      display: inline-flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-grid .wide {
      grid-column: span 2;
    }

    .metric-tile {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      min-height: 112px;
      padding: 18px 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbfc 100%);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    .metric-tile-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }

    .metric-tile-head > div:first-child {
      min-width: 0;
    }

    .metric-label {
      color: var(--ona-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric-value {
      font-size: 1.45rem;
      line-height: 1.2;
      font-weight: 700;
      color: #111827;
      white-space: nowrap;
    }

    .metric-subtext {
      color: var(--ona-muted);
      font-size: 0.82rem;
      min-height: 1.2rem;
      text-align: right;
      max-width: 52%;
      overflow-wrap: normal;
      word-break: normal;
    }

    .chart-area {
      pointer-events: none;
    }

    .chart-endpoint {
      stroke: #ffffff;
      stroke-width: 3;
      filter: drop-shadow(0 3px 6px rgba(15, 23, 42, 0.16));
    }

    .chart-toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin: 18px 0 12px;
    }

    .chart-toolbar .panel-title {
      margin-right: auto;
    }

    .chart-toolbar .form-select {
      width: auto;
      min-width: 170px;
    }

    .chart-export-all-btn {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .chart-card {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      padding: 16px 18px 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fbfd 100%);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.05);
      min-width: 0;
    }

    .chart-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      min-width: 0;
    }

    .chart-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #334155;
      min-width: 0;
    }

    .chart-export-btn {
      flex: 0 0 auto;
      min-width: 46px;
      padding: 2px 9px;
      font-size: 0.74rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .metric-chart {
      display: block;
      width: 100%;
      height: 290px;
      overflow: visible;
    }

    .chart-axis,
    .chart-grid-line {
      stroke: #dbe5ef;
      stroke-width: 1;
    }

    .chart-grid-line {
      stroke-dasharray: 4 6;
    }

    .chart-line {
      fill: none;
      stroke-width: 3.2;
      stroke-linejoin: round;
      stroke-linecap: round;
      filter: drop-shadow(0 5px 10px rgba(15, 23, 42, 0.12));
    }

    .chart-axis-text {
      fill: var(--ona-muted);
      font-size: 12px;
      font-weight: 500;
    }

    .chart-axis-label {
      fill: #475569;
      font-size: 12px;
      font-weight: 650;
    }

    .chart-empty {
      fill: var(--ona-muted);
      font-size: 13px;
    }

    .chart-hover-hitbox {
      fill: transparent;
      pointer-events: all;
      cursor: crosshair;
    }

    .chart-hover-layer {
      pointer-events: none;
      transition: opacity 0.08s ease;
    }

    .chart-crosshair {
      stroke: #475569;
      stroke-width: 1;
      stroke-dasharray: 4 4;
      opacity: 0.72;
    }

    .chart-hover-dot {
      stroke: #ffffff;
      stroke-width: 3;
      filter: drop-shadow(0 3px 6px rgba(15, 23, 42, 0.2));
    }

    .chart-tooltip-bg {
      fill: #0f172a;
      stroke: rgba(255, 255, 255, 0.16);
      stroke-width: 1;
      filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.25));
    }

    .chart-tooltip-title {
      fill: #cbd5e1;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .chart-tooltip-value {
      fill: #ffffff;
      font-size: 14px;
      font-weight: 700;
    }

    .chart-tooltip-time {
      fill: #cbd5e1;
      font-size: 11px;
      font-weight: 500;
    }

    .table-shell {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      overflow-x: auto;
      background: var(--ona-surface);
    }

    .ona-table {
      margin: 0;
      min-width: 840px;
    }

    .ona-table thead th {
      border-bottom: 1px solid var(--ona-border);
      color: #334155;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: nowrap;
      background: var(--ona-surface-muted);
    }

    .ona-table td,
    .ona-table th {
      padding: 0.7rem 0.8rem;
      vertical-align: middle;
    }

    .ona-table tbody tr:last-child td {
      border-bottom: 0;
    }

    [contenteditable] {
      min-height: 34px;
      padding: 5px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      outline: none;
    }

    [contenteditable]:focus {
      border-color: var(--ona-primary);
      background: #f8fbff;
    }

    .form-control,
    .form-select,
    .select {
      border-color: #ccd6e2;
      border-radius: 6px;
    }

    .select {
      min-height: 34px;
      padding: 4px 32px 4px 8px;
      background-color: var(--ona-surface);
    }

    .btn {
      border-radius: 6px;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--ona-primary);
      border-color: var(--ona-primary);
    }

    .btn-primary:hover {
      background: var(--ona-primary-dark);
      border-color: var(--ona-primary-dark);
    }

    .btn-outline-primary {
      color: var(--ona-primary);
      border-color: #9bb7ff;
      background: var(--ona-surface);
    }

    .btn-outline-primary:hover {
      color: var(--ona-surface);
      background: var(--ona-primary);
      border-color: var(--ona-primary);
    }

    .btn-outline-danger {
      color: var(--ona-danger);
      border-color: #fecaca;
      background: var(--ona-surface);
    }

    .source-controls {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fbfcfe;
    }

    .source-controls-grid {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .snat-pool-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 0;
      margin-bottom: 0;
    }

    .snat-pool-toggle .form-check-input {
      margin-top: 0;
    }

    .source-capacity-summary {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .source-capacity-summary .metric-label,
    .source-capacity-summary .metric-subtext {
      white-space: nowrap;
    }

    .source-capacity-summary .metric-subtext {
      max-width: none;
      min-height: 0;
      text-align: left;
    }

    .compact-empty {
      color: var(--ona-muted);
      font-size: 0.92rem;
    }

    .vnic-id-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .vnic-id-text {
      display: inline-block;
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .copy-ocid-btn {
      flex: 0 0 auto;
      padding: 3px 8px;
      font-size: 0.76rem;
      line-height: 1.2;
    }

    @media (max-width: 992px) {
      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chart-grid {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 18px 12px 28px;
      }

      .panel-header {
        display: block;
      }

      .app-header {
        display: block;
        gap: 10px;
      }

      .app-title {
        font-size: 1.6rem;
        white-space: normal;
      }

      .app-meta {
        display: inline-block;
        margin-top: 8px;
      }

      .nat-tabs {
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .nat-tab {
        padding: 10px 8px;
        white-space: normal;
      }

      .metric-grid,
      .chart-grid {
        grid-template-columns: 1fr;
      }

      .source-controls-grid,
      .source-capacity-summary {
        display: block;
      }

      .source-capacity-summary {
        margin-top: 8px;
      }

      .source-capacity-summary .metric-label,
      .source-capacity-summary .metric-subtext {
        white-space: normal;
      }

      .metric-tile-head {
        display: block;
      }

      .metric-subtext {
        max-width: 100%;
        text-align: left;
        margin-top: 4px;
      }

      .chart-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .chart-toolbar .form-select {
        width: 100%;
      }

      .chart-export-all-btn {
        width: 100%;
      }

      .metric-grid .wide {
        grid-column: span 1;
      }

      .panel-actions {
        justify-content: flex-start;
        margin-top: 12px;
      }
    }
  </style>
</head>

<body>
  <script type="text/javascript" src="{{url_for('static', filename='app.js')}}" defer></script>
  <div id="submit-toast" class="submit-toast" role="status" aria-live="polite" aria-atomic="true">Submit successful</div>

  <main class="app-shell">
    <header class="app-header">
      <div class="app-brand">
        <p class="app-kicker">Gateway Console</p>
        <h1 class="app-title">{{ title }}</h1>
      </div>
      <div class="app-meta">Signed in as {{ current_user }}</div>
    </header>
    <nav class="app-nav" aria-label="Gateway sections">
      <div class="nat-tabs">
        <button onclick="changeMenu('dashboard')" type="button" id="dashboard-btn" class="nat-tab is-active">Gateway Dashboard</button>
        <button onclick="changeMenu('dnat')" type="button" id="dnat-btn" class="nat-tab">Destination NAT</button>
        <button onclick="changeMenu('snat')" type="button" id="snat-btn" class="nat-tab">Source NAT</button>
        <button onclick="changeMenu('backups')" type="button" id="backups-btn" class="nat-tab">Backups</button>
      </div>
    </nav>

    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>

</html>
