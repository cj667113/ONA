<!doctype html>
<html id="response">

<head>
  <title>{{ title }}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
  <style>
    :root {
      --ona-bg: #f5f7fa;
      --ona-surface: #ffffff;
      --ona-surface-muted: #f8fafc;
      --ona-border: #d9e1ea;
      --ona-border-soft: #e8edf3;
      --ona-text: #111827;
      --ona-muted: #64748b;
      --ona-primary: #2563eb;
      --ona-primary-dark: #1d4ed8;
      --ona-accent: #0f766e;
      --ona-danger: #dc2626;
    }

    body {
      margin: 0;
      background: var(--ona-bg);
      color: var(--ona-text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app-shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 18px;
    }

    .app-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1.15;
      font-weight: 700;
    }

    .app-kicker {
      margin: 0 0 4px;
      color: var(--ona-accent);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .app-meta {
      color: var(--ona-muted);
      font-size: 0.9rem;
    }

    .app-nav {
      display: flex;
      justify-content: center;
      margin: 4px 0 18px;
    }

    .nat-tabs {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      padding: 4px;
      background: #e9eef5;
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
    }

    .nat-tab {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #475569;
      font-weight: 650;
      min-width: 138px;
      padding: 10px 16px;
    }

    .nat-tab.is-active {
      background: var(--ona-surface);
      color: var(--ona-text);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.1);
    }

    .app-panel {
      background: var(--ona-surface);
      border: 1px solid var(--ona-border);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.3;
      font-weight: 700;
    }

    .panel-status {
      color: var(--ona-muted);
      font-size: 0.86rem;
    }

    .panel-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .submit-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 1080;
      min-width: min(460px, calc(100vw - 32px));
      padding: 14px 22px;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      background: #ecfdf5;
      color: #047857;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
      font-weight: 700;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -18px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .submit-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    #backup-panel .form-label,
    #vnic-panel .form-label,
    #stats-panel .form-label {
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
      color: #495057;
    }

    #backup-list td:first-child,
    #vnic-list td:nth-child(3) {
      max-width: 280px;
    }

    .backup-actions {
      display: inline-flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-grid .wide {
      grid-column: span 2;
    }

    .metric-tile {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      min-height: 104px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    }

    .metric-label {
      color: var(--ona-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric-value {
      font-size: 1.4rem;
      line-height: 1.2;
      font-weight: 600;
    }

    .metric-subtext {
      color: var(--ona-muted);
      font-size: 0.82rem;
      min-height: 1.2rem;
    }

    .metric-progress {
      height: 0.35rem;
      background-color: #e8edf3;
    }

    .metric-progress .progress-bar {
      background-color: var(--ona-primary);
    }

    .chart-toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin: 18px 0 12px;
    }

    .chart-toolbar .panel-title {
      margin-right: auto;
    }

    .chart-toolbar .form-select {
      width: auto;
      min-width: 170px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .chart-card {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      padding: 16px 18px 14px;
      background: #ffffff;
      min-width: 0;
    }

    .chart-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #334155;
      margin-bottom: 4px;
    }

    .metric-chart {
      display: block;
      width: 100%;
      height: 270px;
      overflow: visible;
    }

    .chart-axis,
    .chart-grid-line {
      stroke: #d8e2ee;
      stroke-width: 1;
    }

    .chart-grid-line {
      stroke-dasharray: 3 4;
    }

    .chart-line {
      fill: none;
      stroke: var(--ona-primary);
      stroke-width: 2.75;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .chart-axis-text {
      fill: var(--ona-muted);
      font-size: 12px;
      font-weight: 500;
    }

    .chart-axis-label {
      fill: #475569;
      font-size: 12px;
      font-weight: 650;
    }

    .chart-empty {
      fill: var(--ona-muted);
      font-size: 13px;
    }

    .table-shell {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      overflow-x: auto;
      background: var(--ona-surface);
    }

    .ona-table {
      margin: 0;
      min-width: 840px;
    }

    .ona-table thead th {
      border-bottom: 1px solid var(--ona-border);
      color: #334155;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: nowrap;
      background: var(--ona-surface-muted);
    }

    .ona-table td,
    .ona-table th {
      padding: 0.7rem 0.8rem;
      vertical-align: middle;
    }

    .ona-table tbody tr:last-child td {
      border-bottom: 0;
    }

    [contenteditable] {
      min-height: 34px;
      padding: 5px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      outline: none;
    }

    [contenteditable]:focus {
      border-color: var(--ona-primary);
      background: #f8fbff;
    }

    .form-control,
    .form-select,
    .select {
      border-color: #ccd6e2;
      border-radius: 6px;
    }

    .select {
      min-height: 34px;
      padding: 4px 32px 4px 8px;
      background-color: var(--ona-surface);
    }

    .btn {
      border-radius: 6px;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--ona-primary);
      border-color: var(--ona-primary);
    }

    .btn-primary:hover {
      background: var(--ona-primary-dark);
      border-color: var(--ona-primary-dark);
    }

    .btn-outline-primary {
      color: var(--ona-primary);
      border-color: #9bb7ff;
      background: var(--ona-surface);
    }

    .btn-outline-primary:hover {
      color: var(--ona-surface);
      background: var(--ona-primary);
      border-color: var(--ona-primary);
    }

    .btn-outline-danger {
      color: var(--ona-danger);
      border-color: #fecaca;
      background: var(--ona-surface);
    }

    .source-controls {
      border: 1px solid var(--ona-border-soft);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fbfcfe;
    }

    .source-controls-grid {
      display: grid;
      grid-template-columns: minmax(180px, 0.7fr) minmax(220px, 1fr);
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    .compact-empty {
      color: var(--ona-muted);
      font-size: 0.92rem;
    }

    .vnic-id-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .vnic-id-text {
      display: inline-block;
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    .copy-ocid-btn {
      flex: 0 0 auto;
      padding: 3px 8px;
      font-size: 0.76rem;
      line-height: 1.2;
    }

    @media (max-width: 992px) {
      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chart-grid {
        grid-template-columns: 1fr;
      }

      .source-controls-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .app-shell {
        padding: 18px 12px 28px;
      }

      .app-header,
      .panel-header {
        display: block;
      }

      .app-title {
        font-size: 1.6rem;
      }

      .nat-tabs {
        width: 100%;
      }

      .nat-tab {
        min-width: 0;
        flex: 1;
      }

      .metric-grid,
      .chart-grid,
      .source-controls-grid {
        grid-template-columns: 1fr;
      }

      .chart-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .chart-toolbar .form-select {
        width: 100%;
      }

      .metric-grid .wide {
        grid-column: span 1;
      }

      .panel-actions {
        justify-content: flex-start;
        margin-top: 12px;
      }
    }
  </style>
</head>

<body>
  <script type="text/javascript" src="{{url_for('static', filename='app.js')}}" defer></script>
  <div id="submit-toast" class="submit-toast" role="status" aria-live="polite" aria-atomic="true">Submit successful</div>
  <div class="d-none">
    <div id="temp-delete-btn"><button onclick="deleteRule(this)" class="btn btn-outline-danger btn-sm">X</button></div>
    <select id="temp-dropdown" name="dropdown" value="tcp" class="select">
      <option value="tcp">TCP</option>
      <option value="udp">UDP</option>
    </select>
    <select id="temp-dropdown-snat-protocol" name="dropdown" value="all" class="select">
      <option value="all">ALL</option>
      <option value="tcp">TCP</option>
      <option value="udp">UDP</option>
    </select>
    <select id="temp-dropdown-2" name="dropdown" value="MASQUERADE" class="select">
      <option value="MASQUERADE">MASQUERADE</option>
      <option value="SNAT">SNAT</option>
    </select>
  </div>

  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="app-kicker">Gateway Console</p>
        <h1 class="app-title">{{ title }}</h1>
      </div>
      <div class="app-meta">Signed in as {{ current_user }}</div>
    </header>

    <nav class="app-nav" aria-label="Gateway sections">
      <div class="nat-tabs">
        <button onclick="changeMenu('dashboard')" type="button" id="dashboard-btn" class="nat-tab is-active">Gateway Dashboard</button>
        <button onclick="changeMenu('dnat')" type="button" id="dnat-btn" class="nat-tab">Destination NAT</button>
        <button onclick="changeMenu('snat')" type="button" id="snat-btn" class="nat-tab">Source NAT</button>
        <button onclick="changeMenu('backups')" type="button" id="backups-btn" class="nat-tab">Backups</button>
      </div>
    </nav>

    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>

</html>
